<!DOCTYPE html> <!-- Informa ao navegador que este documento usa HTML5 -->
<html lang="pt-BR"> <!-- Marca o início da página HTML. O atributo lang="pt-BR" define a linguagem pt-BR como a principal -->
<head> <!-- Cabeçalho da página. Aqui fica configurações e informações que não vão aparecer no corpo da página -->
    <meta charset="UTF-8"> <!-- Define o parão de caracteres. Permite acentos, ç, emojis e caracteres especiais -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Faz a página se adaptar a celulares e computadores -->
    <title>Meu Primeiro Site</title> <!-- Título da página, aparece na aba do navegador -->
</head> <!-- Fechamento da tag Head (por causa da barra) -->
<body> <!-- Corpo da página. Tudo que aparece para o usuário fica aqui! -->
    <h1>Bem vindo ao meu site!</h1>
    <h2>Site para estudo do meu curso Full Stack</h2>
    <p>Esta é uma estrutura HTML básica</p>
    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>
</body> <!-- Fechamento da tag body -->
</html>
